<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proses Pembuatan | Tetuko Ethnic</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{

background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,0.9),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(200,200,200,0.4),transparent 40%),
linear-gradient(180deg,#ffffff,#f5f5f7);

color:#1d1d1f;

}


/* BACK BUTTON */

.back{

padding:40px 8%;

}

.back a{

display:inline-block;

padding:10px 22px;

border-radius:40px;

background:rgba(255,255,255,0.7);

backdrop-filter:blur(10px);

text-decoration:none;

color:#1d1d1f;

font-size:14px;

box-shadow:0 6px 20px rgba(0,0,0,0.08);

transition:0.3s;

}

.back a:hover{

transform:translateY(-3px);

box-shadow:0 15px 35px rgba(0,0,0,0.15);

}


/* HEADER */

.header{

text-align:center;

margin-bottom:60px;

}

.header h1{

font-size:46px;

letter-spacing:2px;

font-weight:600;

}

.header p{

color:#6e6e73;

margin-top:6px;

}


/* GALLERY */

.gallery{

column-count:4;

column-gap:25px;

padding:0 8% 100px;

}

@media(max-width:1000px){

.gallery{column-count:3}

}

@media(max-width:700px){

.gallery{column-count:2}

}

.item{

break-inside:avoid;

margin-bottom:25px;

border-radius:18px;

overflow:hidden;

background:white;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

cursor:pointer;

transition:0.4s;

opacity:0;

transform:translateY(40px);

}

.item.show{

opacity:1;

transform:translateY(0);

}

.item:hover{

transform:translateY(-6px);

box-shadow:0 20px 40px rgba(0,0,0,0.15);

}

.item img{

width:100%;

display:block;

transition:0.5s;

}

.item:hover img{

transform:scale(1.08);

}


/* LIGHTBOX */

.lightbox{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.94);

display:none;

flex-direction:column;

align-items:center;

justify-content:center;

z-index:999;

}

.lightbox img{

max-width:90%;

max-height:75vh;

border-radius:14px;

}

.lightbox p{

color:white;

margin-top:20px;

}

.close{

position:absolute;

top:30px;

right:40px;

font-size:40px;

color:white;

cursor:pointer;

}

</style>

</head>


<body>



<div class="back">

<a href="index.html">← Kembali ke Beranda</a>

</div>



<div class="header">

<h1>PROSES PEMBUATAN</h1>

<p>Handcrafted by Tetuko Ethnic</p>

</div>



<div class="gallery">


<div class="item" data-name="Pemilihan kayu untuk instrumen">

<img src="img/proses1.jpg">

</div>


<div class="item" data-name="Penghalusan kayu instrumen">

<img src="img/proses2.jpg">

</div>


<div class="item" data-name="Pembuatan bathok rebab">

<img src="img/proses3.jpg">

</div>


<div class="item" data-name="Perakitan instrumen">

<img src="img/proses4.jpg">

</div>


<div class="item" data-name="Finishing alat musik">

<img src="img/proses5.jpg">

</div>


</div>



<div class="lightbox" id="lightbox">

<div class="close">×</div>

<img id="lightbox-img">

<p id="lightbox-text"></p>

</div>



<script>


const items=document.querySelectorAll(".item")

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show")

}

})

})

items.forEach(item=>observer.observe(item))


const lightbox=document.getElementById("lightbox")

const lightboxImg=document.getElementById("lightbox-img")

const lightboxText=document.getElementById("lightbox-text")


items.forEach(item=>{

item.onclick=()=>{

lightbox.style.display="flex"

lightboxImg.src=item.querySelector("img").src

lightboxText.innerText=item.dataset.name

}

})


document.querySelector(".close").onclick=()=>{

lightbox.style.display="none"

}

</script>


</body>
</html>
