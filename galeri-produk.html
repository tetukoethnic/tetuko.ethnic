<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Produk | Tetuko Ethnic</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#f5f5f7;
color:#1d1d1f;
}

/* NAV BACK */
.back-nav{
padding:20px 8%;
}

.back-nav a{
text-decoration:none;
color:#0066cc;
font-size:15px;
}

/* TITLE */

.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
font-size:40px;
font-weight:600;
letter-spacing:2px;
}

/* FILTER */

.filter-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:40px;
padding:0 10%;
}

.filter-btn{

padding:8px 18px;
border-radius:20px;
border:1px solid #ddd;
background:white;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.filter-btn:hover{
background:#1d1d1f;
color:white;
}

/* GALERI GRID */

.gallery{
padding:0 10% 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.gallery-item{
position:relative;
overflow:hidden;
border-radius:14px;
cursor:pointer;
background:white;
transition:0.3s;
}

.gallery-item:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.gallery-item img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

/* LIKE BUTTON */

.like{
position:absolute;
bottom:10px;
right:10px;
background:rgba(0,0,0,0.6);
color:white;
padding:6px 10px;
border-radius:20px;
font-size:13px;
display:flex;
align-items:center;
gap:5px;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
padding:30px;
}

.modal-content{

max-width:900px;
width:100%;
background:white;
border-radius:12px;
overflow:hidden;
animation:fade 0.4s;
}

.modal img{
width:100%;
height:500px;
object-fit:cover;
}

.modal-desc{
padding:20px;
}

.modal-desc h3{
margin-bottom:10px;
}

.close{
position:absolute;
top:25px;
right:40px;
font-size:30px;
color:white;
cursor:pointer;
}

@keyframes fade{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<div class="back-nav">
<a href="index.html">← Kembali ke Beranda</a>
</div>

<div class="title">
<h1>GALERI PRODUK</h1>
</div>

<!-- FILTER -->

<div class="filter-container">

<button class="filter-btn" data-filter="all">All</button>
<button class="filter-btn" data-filter="gender">Gender</button>
<button class="filter-btn" data-filter="rebab">Rebab</button>
<button class="filter-btn" data-filter="srenten">Srenten</button>
<button class="filter-btn" data-filter="gandarukem">Gandarukem</button>
<button class="filter-btn" data-filter="senar">Senar</button>
<button class="filter-btn" data-filter="popor">Popor</button>
<button class="filter-btn" data-filter="watangan">Watangan</button>
<button class="filter-btn" data-filter="gigbag">Gigbag</button>
<button class="filter-btn" data-filter="softcase">Softcase</button>
<button class="filter-btn" data-filter="kuningan">Kuningan</button>
<button class="filter-btn" data-filter="bathok">Bathok</button>

</div>

<!-- GALERI -->

<div class="gallery">

<div class="gallery-item" data-category="rebab" data-desc="Rebab handmade Tetuko Ethnic kualitas premium">
<img src="img/rebab1.jpg">
<div class="like" data-id="1">❤️ <span>0</span></div>
</div>

<div class="gallery-item" data-category="gender" data-desc="Instrumen gender produksi Tetuko Ethnic">
<img src="img/gender1.jpg">
<div class="like" data-id="2">❤️ <span>0</span></div>
</div>

<div class="gallery-item" data-category="gigbag" data-desc="Gigbag kuat dan elegan untuk alat musik">
<img src="img/gigbag1.jpg">
<div class="like" data-id="3">❤️ <span>0</span></div>
</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="close" id="close">×</div>

<div class="modal-content">

<img id="modal-img">

<div class="modal-desc">

<h3>Tetuko Ethnic</h3>

<p id="modal-text"></p>

</div>

</div>

</div>


<script>

/* FILTER */

const filterButtons=document.querySelectorAll(".filter-btn");
const items=document.querySelectorAll(".gallery-item");

filterButtons.forEach(btn=>{
btn.addEventListener("click",()=>{

let filter=btn.dataset.filter;

items.forEach(item=>{

if(filter==="all" || item.dataset.category===filter){

item.style.display="block";

}else{

item.style.display="none";

}

});

});
});


/* MODAL */

const modal=document.getElementById("modal");
const modalImg=document.getElementById("modal-img");
const modalText=document.getElementById("modal-text");
const close=document.getElementById("close");

items.forEach(item=>{

item.addEventListener("click",()=>{

modal.style.display="flex";

modalImg.src=item.querySelector("img").src;

modalText.innerText=item.dataset.desc;

});

});

close.onclick=()=>modal.style.display="none";

modal.onclick=(e)=>{

if(e.target===modal){

modal.style.display="none";

}

}


/* LIKE SYSTEM */

document.querySelectorAll(".like").forEach(btn=>{

let id=btn.dataset.id;

let count=localStorage.getItem("like-"+id);

if(count){

btn.querySelector("span").innerText=count;

}

btn.addEventListener("click",(e)=>{

e.stopPropagation();

let current=parseInt(btn.querySelector("span").innerText);

current++;

btn.querySelector("span").innerText=current;

localStorage.setItem("like-"+id,current);

});

});

</script>

</body>
</html>
