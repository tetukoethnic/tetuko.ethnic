<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Produk | Tetuko Ethnic</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{

background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,0.9),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(200,200,200,0.4),transparent 40%),
linear-gradient(180deg,#ffffff,#f5f5f7);

color:#1d1d1f;

min-height:100vh;

}


/* NAV BACK */

.back{

padding:40px 8%;

}

.back a{

display:inline-block;

padding:10px 22px;

border-radius:40px;

background:rgba(255,255,255,0.7);

backdrop-filter:blur(10px);

text-decoration:none;

color:#1d1d1f;

font-size:14px;

box-shadow:0 6px 20px rgba(0,0,0,0.08);

transition:0.3s;

}

.back a:hover{

transform:translateY(-3px);

box-shadow:0 15px 35px rgba(0,0,0,0.15);

}


/* HEADER */

.header{

text-align:center;

margin-bottom:60px;

}

.header h1{

font-size:48px;

letter-spacing:2px;

font-weight:600;

}

.header p{

color:#6e6e73;

margin-top:6px;

}


/* SEARCH */

.tools{

padding:0 8%;

margin-bottom:40px;

}

.search{

width:100%;

padding:14px;

border-radius:12px;

border:1px solid #ddd;

background:rgba(255,255,255,0.8);

backdrop-filter:blur(10px);

margin-bottom:25px;

}


/* FILTER */

.filters{

display:flex;

flex-wrap:wrap;

gap:10px;

}

.filters button{

padding:8px 18px;

border-radius:20px;

border:1px solid #ddd;

background:white;

cursor:pointer;

transition:0.3s;

}

.filters button:hover{

background:#1d1d1f;

color:white;

}


/* MASONRY GRID */

.gallery{

column-count:4;

column-gap:25px;

padding:0 8% 100px;

}

@media(max-width:1000px){

.gallery{column-count:3}

}

@media(max-width:700px){

.gallery{column-count:2}

}

.item{

break-inside:avoid;

margin-bottom:25px;

border-radius:18px;

overflow:hidden;

background:white;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

cursor:pointer;

transition:0.4s;

opacity:0;

transform:translateY(40px);

}

.item.show{

opacity:1;

transform:translateY(0);

}

.item:hover{

transform:translateY(-6px);

box-shadow:0 20px 40px rgba(0,0,0,0.15);

}

.item img{

width:100%;

display:block;

transition:0.5s;

}

.item:hover img{

transform:scale(1.08);

}


/* LIKE */

.like{

position:absolute;

margin-top:-40px;

right:10px;

background:rgba(0,0,0,0.6);

color:white;

padding:6px 12px;

border-radius:20px;

font-size:14px;

cursor:pointer;

}


/* LIGHTBOX */

.lightbox{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.94);

display:none;

flex-direction:column;

align-items:center;

justify-content:center;

z-index:999;

}

.lightbox img{

max-width:90%;

max-height:75vh;

border-radius:14px;

}

.lightbox p{

color:white;

margin-top:20px;

}

.close{

position:absolute;

top:30px;

right:40px;

font-size:40px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>



<div class="back">

<a href="index.html">← Kembali ke Beranda</a>

</div>



<div class="header">

<h1>GALERI PRODUK</h1>

<p>Tetuko Ethnic</p>

</div>



<div class="tools">

<input class="search" id="searchInput" placeholder="Cari produk Tetuko Ethnic...">

<div class="filters">

<button data-filter="all">All</button>
<button data-filter="rebab">Rebab</button>
<button data-filter="gender">Gender</button>
<button data-filter="srenten">Srenten</button>
<button data-filter="gigbag">Gigbag</button>

</div>

</div>



<div class="gallery">


<div class="item" data-category="rebab" data-name="rebab tetuko ethnic">

<img src="img/rebab1.jpg">

<div class="like" data-id="1">❤️ <span>0</span></div>

</div>


<div class="item" data-category="gender" data-name="gender tetuko ethnic">

<img src="img/gender1.jpg">

<div class="like" data-id="2">❤️ <span>0</span></div>

</div>


<div class="item" data-category="gigbag" data-name="gigbag tetuko ethnic">

<img src="img/gigbag1.jpg">

<div class="like" data-id="3">❤️ <span>0</span></div>

</div>


</div>



<div class="lightbox" id="lightbox">

<div class="close">×</div>

<img id="lightbox-img">

<p id="lightbox-text"></p>

</div>



<script>

/* SCROLL ANIMATION */

const items=document.querySelectorAll(".item")

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show")

}

})

})

items.forEach(item=>observer.observe(item))


/* FILTER */

const filters=document.querySelectorAll(".filters button")

filters.forEach(btn=>{

btn.onclick=()=>{

let filter=btn.dataset.filter

items.forEach(item=>{

if(filter==="all" || item.dataset.category===filter){

item.style.display="block"

}else{

item.style.display="none"

}

})

}

})


/* SEARCH */

const search=document.getElementById("searchInput")

search.addEventListener("keyup",()=>{

let value=search.value.toLowerCase()

items.forEach(item=>{

if(item.dataset.name.includes(value)){

item.style.display="block"

}else{

item.style.display="none"

}

})

})


/* LIGHTBOX */

const lightbox=document.getElementById("lightbox")

const lightboxImg=document.getElementById("lightbox-img")

const lightboxText=document.getElementById("lightbox-text")

items.forEach(item=>{

item.onclick=()=>{

lightbox.style.display="flex"

lightboxImg.src=item.querySelector("img").src

lightboxText.innerText=item.dataset.name

}

})

document.querySelector(".close").onclick=()=>{

lightbox.style.display="none"

}


/* LIKE SYSTEM */

document.querySelectorAll(".like").forEach(btn=>{

let id=btn.dataset.id

let saved=localStorage.getItem("like-"+id)

if(saved){

btn.querySelector("span").innerText=saved

}

btn.onclick=(e)=>{

e.stopPropagation()

let count=parseInt(btn.querySelector("span").innerText)

count++

btn.querySelector("span").innerText=count

localStorage.setItem("like-"+id,count)

}

})

</script>

</body>
</html>
