<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Produk | Tetuko Ethnic</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#f5f5f7;
color:#1d1d1f;
}


/* BACK BUTTON */

.back-container{
padding:40px 8%;
}

.back-button{

display:inline-flex;
align-items:center;
gap:10px;

padding:10px 18px;

background:white;
border-radius:30px;

text-decoration:none;
color:#1d1d1f;

font-size:14px;

box-shadow:0 5px 20px rgba(0,0,0,0.08);

transition:0.3s;
}

.back-button:hover{

transform:translateY(-2px);
box-shadow:0 8px 25px rgba(0,0,0,0.15);

}


/* TITLE */

.header{

text-align:center;
margin-bottom:40px;

}

.header h1{

font-size:42px;
letter-spacing:2px;
font-weight:600;

}

.header p{

color:#6e6e73;
margin-top:5px;

}


/* TOOLS */

.tools{

padding:0 8%;
margin-bottom:30px;

}

.search{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:20px;
font-size:14px;

}


.filters{

display:flex;
flex-wrap:wrap;
gap:10px;

}

.filters button{

padding:8px 18px;
border-radius:20px;
border:1px solid #ddd;

background:white;
cursor:pointer;

transition:0.3s;

}

.filters button:hover{

background:#1d1d1f;
color:white;

}


/* GALERI */

.gallery{

padding:0 8% 80px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.item{

position:relative;
overflow:hidden;
border-radius:16px;
cursor:pointer;

}

.item img{

width:100%;
height:280px;
object-fit:cover;

transition:0.4s;

}

.item:hover img{

transform:scale(1.08);

}


/* LIKE */

.like{

position:absolute;
bottom:10px;
right:10px;

background:rgba(0,0,0,0.6);

color:white;

padding:6px 12px;

border-radius:20px;

font-size:14px;

cursor:pointer;

}


/* LIGHTBOX */

.lightbox{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.92);

display:none;

flex-direction:column;

align-items:center;
justify-content:center;

padding:40px;

z-index:999;

}

.lightbox img{

max-width:90%;
max-height:70vh;

border-radius:12px;

}

.lightbox p{

color:white;
margin-top:20px;

}

.close{

position:absolute;

top:30px;
right:40px;

font-size:40px;

color:white;

cursor:pointer;

}

</style>
</head>

<body>


<div class="back-container">

<a href="index.html" class="back-button">

← Kembali ke Beranda

</a>

</div>


<div class="header">

<h1>GALERI PRODUK</h1>
<p>Tetuko Ethnic</p>

</div>


<div class="tools">

<input class="search" id="searchInput" placeholder="Cari produk...">


<div class="filters">

<button data-filter="all">All</button>
<button data-filter="gender">Gender</button>
<button data-filter="rebab">Rebab</button>
<button data-filter="srenten">Srenten</button>
<button data-filter="gandarukem">Gandarukem</button>
<button data-filter="senar">Senar</button>
<button data-filter="popor">Popor</button>
<button data-filter="watangan">Watangan</button>
<button data-filter="gigbag">Gigbag</button>
<button data-filter="softcase">Softcase</button>
<button data-filter="kuningan">Kuningan</button>
<button data-filter="bathok">Bathok</button>

</div>

</div>


<div class="gallery" id="gallery">


<div class="item" data-category="rebab" data-name="rebab tetuko ethnic">

<img src="img/rebab1.jpg">

<div class="like" data-id="1">❤️ <span>0</span></div>

</div>


<div class="item" data-category="gender" data-name="gender tetuko ethnic">

<img src="img/gender1.jpg">

<div class="like" data-id="2">❤️ <span>0</span></div>

</div>


<div class="item" data-category="gigbag" data-name="gigbag tetuko ethnic">

<img src="img/gigbag1.jpg">

<div class="like" data-id="3">❤️ <span>0</span></div>

</div>


</div>


<div class="lightbox" id="lightbox">

<div class="close">×</div>

<img id="lightbox-img">

<p id="lightbox-text"></p>

</div>


<script>


const items=document.querySelectorAll(".item")

const filters=document.querySelectorAll(".filters button")

const search=document.getElementById("searchInput")


filters.forEach(btn=>{

btn.onclick=()=>{

let filter=btn.dataset.filter

items.forEach(item=>{

let category=item.dataset.category

if(filter==="all" || category===filter){

item.style.display="block"

}else{

item.style.display="none"

}

})

}

})


search.addEventListener("keyup",()=>{

let value=search.value.toLowerCase()

items.forEach(item=>{

let name=item.dataset.name

if(name.includes(value)){

item.style.display="block"

}else{

item.style.display="none"

}

})

})


const lightbox=document.getElementById("lightbox")

const lightboxImg=document.getElementById("lightbox-img")

const lightboxText=document.getElementById("lightbox-text")


items.forEach(item=>{

item.onclick=()=>{

lightbox.style.display="flex"

lightboxImg.src=item.querySelector("img").src

lightboxText.innerText=item.dataset.name

}

})


document.querySelector(".close").onclick=()=>{

lightbox.style.display="none"

}


document.querySelectorAll(".like").forEach(btn=>{

let id=btn.dataset.id

let saved=localStorage.getItem("like-"+id)

if(saved){

btn.querySelector("span").innerText=saved

}

btn.onclick=(e)=>{

e.stopPropagation()

let count=parseInt(btn.querySelector("span").innerText)

count++

btn.querySelector("span").innerText=count

localStorage.setItem("like-"+id,count)

}

})


</script>


</body>
</html>
